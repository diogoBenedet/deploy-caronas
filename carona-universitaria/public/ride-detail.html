<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalhes da Carona — Carona Universitária</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/" class="navbar-brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3"/><rect x="9" y="11" width="14" height="10" rx="2"/><circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/></svg>
        Carona Uni
      </a>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
      <ul class="navbar-links" id="navLinks">
        <li class="nav-loggedout"><a href="/">Início</a></li>
        <li class="nav-loggedin" style="display:none;"><a href="/dashboard.html">Dashboard</a></li>
        <li><a href="/find-rides.html">Buscar Caronas</a></li>
        <li class="nav-loggedin" style="display:none;"><a href="/offer-ride.html">Oferecer Carona</a></li>
        <li class="nav-loggedin" style="display:none;"><a href="/my-rides.html">Minhas Caronas</a></li>
        <li class="nav-loggedout"><a href="/login.html">Entrar</a></li>
        <li class="nav-loggedout"><a href="/register.html" class="btn-nav">Cadastrar</a></li>
        <li id="navLoggedIn" class="nav-loggedin" style="display:none;">
          <div class="navbar-user-group">
          <div class="notif-bell" id="notifBell" onclick="toggleNotifPanel()" title="Notificações">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
            <span class="notif-badge" id="notifBadge"></span>
            <div class="notif-panel" id="notifPanel">
              <div class="notif-header">
                <strong>Notificações</strong>
                <button onclick="event.stopPropagation();markAllNotifRead()" class="notif-read-all">Marcar todas</button>
              </div>
              <div id="notifList"><p class="notif-empty">Carregando…</p></div>
            </div>
          </div>
          <div class="navbar-user" id="userMenu">
            <div id="navAvatarWrap"></div>
            <span id="navUserName"></span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
            <div class="dropdown-menu" id="dropdownMenu">
              <a href="/profile.html">Meu Perfil</a>
              <hr/>
              <a href="#" class="danger" id="logoutBtn">Sair</a>
            </div>
          </div>
          </div>
        </li>
      </ul>
    </div>
  </nav>

  <div id="rideContent">
    <div class="loader" style="margin-top:4rem;"><div class="spinner"></div></div>
  </div>

  <!-- MODAL DE CONFIRMAÇÃO -->
  <div class="modal-overlay hidden" id="confirmModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Confirmar reserva</h2>
        <button class="modal-close" id="closeConfirmModal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="confirmModalBody"></div>
      <div style="display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1.25rem;">
        <button class="btn btn-ghost" id="cancelReserveBtn">Cancelar</button>
        <button class="btn btn-secondary" id="confirmReserveBtn">Confirmar reserva</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/app.js"></script>
  <script src="/js/ride-detail.js"></script>
  <script>
    function toggleNotifPanel() {
      document.getElementById('notifPanel').classList.toggle('open');
      document.getElementById('dropdownMenu')?.classList.remove('open');
    }
    document.addEventListener('click', (e) => {
      if (!e.target.closest('#notifBell')) document.getElementById('notifPanel')?.classList.remove('open');
    });
  </script>
</body>
</html>
